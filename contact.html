<div class="container my-5">

<h2 class="text-center">Book a Machine</h2>

<form onsubmit="sendToWhatsApp(); return false;">

<div class="mb-3">
<input type="text" id="name" class="form-control" placeholder="Your Name" required>
</div>

<div class="mb-3">
<input type="text" id="phone" class="form-control" placeholder="Phone Number" required>
</div>

<div class="mb-3">
<select id="machine" class="form-control">
<option>JCB</option>
<option>Dynapac Roller</option>
<option>Case Roller</option>
<option>Soil Compactor</option>
<option>AJAX ARGO 2000</option>
<option>Tractor</option>
<option>DHumas</option>
</select>
</div>

<div class="mb-3">
<textarea id="details" class="form-control" placeholder="Project Details"></textarea>
</div>

<button class="btn btn-warning w-100">Send Booking</button>

</form>

<br>

<p class="text-center">📞 9657897711</p>

<a href="https://wa.me/919657897711" class="btn btn-success w-100">Direct WhatsApp</a>

</div>

<!-- WhatsApp Script -->
<script>
function sendToWhatsApp() {

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let machine = document.getElementById("machine").value;
let details = document.getElementById("details").value;

let message = `New Booking:%0AName: ${name}%0APhone: ${phone}%0AMachine: ${machine}%0ADetails: ${details}`;

let url = "https://wa.me/919657897711?text=" + message;

window.open(url, '_blank');
}
</script>
